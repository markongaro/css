<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cafe Menu</title>
    <link href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="menu">
      <main>
	<h1>ONGARO CAFFE</h1>
	<p id="date">Est. 2026</p>
	<hr/>
	<section>
	  <h2>Coffee</h2>
	  <img alt="cofee cup" src="./assets/imgs/coffee-cup.svg"/>
	  <article class="item">
	    <p class="name">French Vanilla</p><p class="price">3.00</p>
	  </article>
	  <article class="item">
	    <p class="name">Caramel Macchiato</p><p class="price">3.75</p>
	  </article>
	  <article class="item">
	    <p class="name">Pumpkin Spice</p><p class="price">3.50</p>
	  </article>
	  <article class="item">
	    <p class="name">Hazelnut</p><p class="price">4.00</p>
	  </article>
	  <article class="item">
	    <p class="name">Mocha</p><p class="price">4.50</p>
	  </article>
	</section>

	<section>
	  <h2>Desserts</h2>
	  <img alt="cup cake" src="./assets/imgs/dessert.svg"/>
	  <article class="item">
	    <p class="name">Donuts</p><p class="price">1.50</p>
	  </article>
	  <article class="item">
	    <p class="name">Cherry Pie</p><p class="price">2.75</p>
	  </article>
	  <article class="item">
	    <p class="name">Cheesecake</p><p class="price">3.00</p>
	  </article>
	  <article class="item">
	    <p class="name">Cinnamon Roll</p><p class="price">2.50</p>
	  </article>
	</section>

      </main>
      <hr/>

      <footer>
	<address>
	  <p><a href="https://example.com" target="_blank" >Visit our website</a></p>
	  <p class="address">Eastern Bypass, Utawala, Nairobi</p>
	</address>
      </footer>

    </div>
  </body>
</html>
