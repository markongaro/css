<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ToDo List</title>
    <link href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <div class="app">
      <h1>My To-Do List</h1>

      <ul class="todo-list">

        <li>
          <input id="dsa" type="checkbox" />
          <label for="dsa">Complete DSA</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="#" target="_blank">Rosen's discrete maths</a></li>
          </ul>
        </li>


        <li>
          <input id="portfolio" type="checkbox" />
          <label for="portfolio">Finish my portfolio</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="#" target="_blank">Review progress</a></li>

          </ul>
        </li>


        <li>
          <input id="turnitin" type="checkbox" />
          <label for="turnitin">Build a turnitin bot</label>

          <ul class="sub-item">
            <li><a class="sub-item-link" href="#" target="_blank">Update commits on GitHub</a></li>
          </ul>

          
        </li>

        <li>
          <input id="interview" type="checkbox" />
          <label for="interview">Go over leetcode for interview prep</label>
          <ul class="sub-item">
            <li><a class="sub-item-link" href="#" target="_blank">Purchase leetcode premium</a></li>
          </ul>

        </li>

      </ul>
    </div>
  </body>
</html>
